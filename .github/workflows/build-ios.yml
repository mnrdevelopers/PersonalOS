name: Build iOS App

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch: # Allows manual trigger

jobs:
  build:
    name: Build iOS App
    runs-on: macos-14
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install Dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Build Web Assets
        run: npm run build

      - name: Delete existing iOS platform
        run: rm -rf ios

      - name: Add iOS Platform
        run: npx cap add ios

      - name: Sync iOS Platform
        run: npx cap sync ios

      - name: Patch AppDelegate.swift (bridge restorationHandler type mismatch)
        run: |
          python3 - <<'EOF'
          import re, sys

          path = "ios/App/App/AppDelegate.swift"
          with open(path, "r") as f:
              src = f.read()

          # Replace the continue userActivity method entirely with a bridged version
          old = re.compile(
              r'func application\(_ application: UIApplication, continue userActivity: NSUserActivity, '
              r'restorationHandler: @escaping \([^\)]*\)\s*->\s*Void\)\s*->\s*Bool \{[^}]*\}',
              re.DOTALL
          )

          new = (
              "func application(_ application: UIApplication, continue userActivity: NSUserActivity, "
              "restorationHandler: @escaping ([UIUserActivityRestoring]?) -> Void) -> Bool {\n"
              "        // Called when the app was launched with an activity, including Universal Links.\n"
              "        // Feel free to add additional processing here, but if you want the App API to support\n"
              "        // tracking app url opens, make sure to keep this call\n"
              "        return ApplicationDelegateProxy.shared.application(application, continue: userActivity, restorationHandler: restorationHandler)\n"
              "    }"
          )

          result, n = old.subn(new, src)
          if n == 0:
              print("WARNING: pattern not found, no replacement made", file=sys.stderr)
              sys.exit(1)

          with open(path, "w") as f:
              f.write(result)

          print("AppDelegate.swift patched successfully.")
          EOF

      - name: CocoaPods Update & Install (if applicable)
        run: |
          if [ -f ios/App/Podfile ]; then
            cd ios/App
            pod repo update
            pod install
          else
            echo "No Podfile found, skipping CocoaPods setup (using Swift Package Manager)."
          fi

      - name: Clean Xcode and Dependency Caches
        run: |
          rm -rf ~/Library/Developer/Xcode/DerivedData
          rm -rf ios/App/Package.resolved
          rm -rf ios/App/Pods

      - name: Resolve Swift Package Dependencies
        run: |
          xcodebuild -project ios/App/App.xcodeproj \
                     -resolvePackageDependencies

      - name: Build Xcode Project (Simulator)
        run: |
          xcodebuild -project ios/App/App.xcodeproj \
                     -scheme App \
                     -sdk iphonesimulator \
                     -configuration Debug \
                     clean build
