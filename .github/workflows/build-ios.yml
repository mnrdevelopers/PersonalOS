name: Build iOS App

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch: # Allows manual trigger

jobs:
  build:
    name: Build iOS App
    runs-on: macos-14
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install Dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Build Web Assets
        run: npm run build

      - name: Delete existing iOS platform
        run: rm -rf ios

      - name: Add iOS Platform
        run: npx cap add ios

      - name: Sync iOS Platform
        run: npx cap sync ios

      - name: Patch AppDelegate.swift for Swift 5.7+ Existential Types
        run: |
          perl -pi -e 's/\[UIUserActivityRestoring\]/\[any UIUserActivityRestoring\]/g' ios/App/App/AppDelegate.swift
          perl -pi -e 's/\[Any\]/\[any UIUserActivityRestoring\]/g' ios/App/App/AppDelegate.swift

      - name: CocoaPods Update & Install (if applicable)
        run: |
          if [ -f ios/App/Podfile ]; then
            cd ios/App
            pod repo update
            pod install
          else
            echo "No Podfile found, skipping CocoaPods setup (using Swift Package Manager)."
          fi

      - name: Clean Xcode and Dependency Caches
        run: |
          rm -rf ~/Library/Developer/Xcode/DerivedData
          rm -rf ios/App/Package.resolved
          rm -rf ios/App/Pods

      - name: Resolve Swift Package Dependencies
        run: |
          xcodebuild -project ios/App/App.xcodeproj \
                     -resolvePackageDependencies

      - name: Build Xcode Project (Simulator)
        run: |
          xcodebuild -project ios/App/App.xcodeproj \
                     -scheme App \
                     -sdk iphonesimulator \
                     -configuration Debug \
                     clean build
